<!DOCTYPE html>
<html lang="en">

<head>
    <title>Alumni Hub Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/wiki.css">

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="mobile-header">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <span class="fw-bold">Documentation</span>
        </div>
    </div>

    <!-- Wiki Navigation Sidebar -->
    <div class="sidebar-container" id="sidebar">
        <div style="padding: 2rem 1.5rem 0 1.5rem;">
            <div class="brand-title justify-content-between mb-4">
                <div class="d-flex align-items-center gap-2">
                    <i class="fas fa-book-open text-primary"></i>
                    <span>Wiki Portal</span>
                </div>
                <button class="btn btn-sm btn-light d-lg-none" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="sidebar-scroll-area" style="padding-top: 0;">
            <div class="nav-label">Documentation</div>
            <nav id="sidebar-nav" class="nav flex-column">
                <a class="nav-link wiki-link" href="#" data-file="docs/user-guide.md"><i class="fas fa-user-graduate me-2"></i>User Guide</a>
                <a class="nav-link wiki-link" href="#" data-file="docs/admin-guide.md"><i class="fas fa-shield-alt me-2"></i>Admin Guide</a>
                <a class="nav-link wiki-link" href="#" data-file="docs/developer-guide.md"><i class="fas fa-code me-2"></i>Developer Guide</a>
            </nav>
        </div>

        <div class="sidebar-footer" style="padding-top: 2rem;">
            <a href="index.html" class="btn btn-primary-custom w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="fas fa-arrow-left"></i> Public Directory
            </a>
            
            <a href="admin.html" class="btn btn-sm w-100 d-flex align-items-center justify-content-center gap-2 text-secondary admin-access-btn mt-2">
                <i class="fas fa-lock"></i> Admin Access
            </a>
        </div>
    </div>

    <!-- Main Rendering Area -->
    <div class="main-content">
        <div class="card-custom mx-auto" style="max-width: 900px; padding: 3rem;">
            <div id="wiki-content" class="markdown-body">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="text-muted mt-3">Loading Documentation...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/wiki.js"></script>
</body>
</html>
